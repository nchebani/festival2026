<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKSTAGE HUB</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { background: #0a0a0c; color: #e2e8f0; font-family: 'Inter', sans-serif; }
.glass { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
.admin-only { display: none; }
.is-admin .admin-only { display: block; }
.tab-content { display: none; padding-bottom: 100px; }
.active { display: block; }
</style>
</head>
<body>

<div id="login-page" class="fixed inset-0 z-[100] bg-[#0a0a0c] flex items-center justify-center p-6">
<div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
<h1 class="text-3xl font-black italic text-cyan-500 mb-2">BACKSTAGE</h1>
<p class="text-slate-500 text-xs uppercase tracking-[0.2em] mb-8">Accès sécurisé</p>
<input type="password" id="pass" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-center text-xl mb-4 outline-none focus:border-cyan-500 text-white" placeholder="CODE">
<button id="entry-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-2xl transition-all">ENTRER</button>
</div>
</div>

<div id="main-app" class="hidden">
<header class="p-6 flex justify-between items-center sticky top-0 bg-[#0a0a0c]/80 backdrop-blur-md z-40">
<div>
<h2 class="font-black italic text-xl tracking-tighter">LIVE HUB <span class="text-cyan-500">2026</span></h2>
<p id="role-tag" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest"></p>
</div>
<button onclick="location.reload()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-power-off text-sm"></i></button>
</header>

<main class="p-4">
<section id="home" class="tab-content active">
<div class="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 mb-6">
<h3 class="text-xs font-bold text-cyan-500 uppercase mb-2">Prochain RDV</h3>
<p class="text-2xl font-black italic leading-tight">RÉPÉTITION GÉNÉRALE</p>
<p class="text-slate-400 text-sm mt-1 text-cyan-200/50">Studio 4 - 19:00</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="glass p-6 rounded-3xl text-center"><span class="text-[10px] text-slate-500 block uppercase">Membres</span><b id="count-m" class="text-2xl font-black">0</b></div>
<div class="glass p-6 rounded-3xl text-center"><span class="text-[10px] text-slate-500 block uppercase">Titres</span><b id="count-s" class="text-2xl font-black">0</b></div>
</div>
</section>

<section id="setlist" class="tab-content">
<div class="flex justify-between items-center mb-6">
<h3 class="text-xl font-black italic">SETLIST</h3>
<button id="add-s" class="admin-only bg-cyan-600 w-10 h-10 rounded-full shadow-lg shadow-cyan-900/20">+</button>
</div>
<div id="list-s" class="space-y-3"></div>
</section>

<section id="chat" class="tab-content">
<h3 class="text-xl font-black italic mb-6">FEEDBACK ÉQUIPE</h3>
<div id="chat-box" class="h-[55vh] overflow-y-auto mb-4 space-y-4 pr-2"></div>
<div class="flex gap-2">
<input type="text" id="chat-msg" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-cyan-500" placeholder="Ton message...">
<button id="send-btn" class="bg-cyan-600 w-14 h-14 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
</div>
</section>
</main>

<nav class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black to-transparent">
<div class="glass rounded-[2rem] flex justify-around p-4 items-center">
<button onclick="show('home')" class="text-cyan-500 nav-link"><i class="fas fa-th-large text-xl"></i></button>
<button onclick="show('setlist')" class="text-slate-600 nav-link"><i class="fas fa-music text-xl"></i></button>
<button onclick="show('chat')" class="text-slate-600 nav-link"><i class="fas fa-comment-alt text-xl"></i></button>
</div>
</nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIGURATION À REMPLACER PAR LA TIENNE
const firebaseConfig = {
apiKey: "TON_API_KEY",
authDomain: "TON_AUTH_DOMAIN",
projectId: "TON_PROJECT_ID",
storageBucket: "TON_STORAGE_BUCKET",
messagingSenderId: "TON_SENDER_ID",
appId: "TON_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN LOGIC
document.getElementById('entry-btn').addEventListener('click', () => {
const code = document.getElementById('pass').value;
if(code === "1234") {
document.body.classList.add('is-admin');
start("ADMIN");
} else if(code === "0000") {
start("MUSICIAN");
} else { alert("Code erroné"); }
});

function start(role) {
document.getElementById('login-page').style.display = 'none';
document.getElementById('main-app').classList.remove('hidden');
document.getElementById('role-tag').innerText = role;
}

// REALTIME SYNC
onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), (snap) => {
const box = document.getElementById('chat-box');
box.innerHTML = "";
snap.forEach(doc => {
const m = doc.data();
box.innerHTML += `<div class="bg-white/5 border border-white/5 p-4 rounded-3xl rounded-tl-none"><p class="text-sm">${m.txt}</p></div>`;
});
box.scrollTop = box.scrollHeight;
});

onSnapshot(query(collection(db, "songs"), orderBy("time", "asc")), (snap) => {
const list = document.getElementById('list-s');
list.innerHTML = "";
document.getElementById('count-s').innerText = snap.size;
snap.forEach(doc => {
const s = doc.data();
list.innerHTML += `<div class="glass p-5 rounded-2xl flex justify-between"><b>${s.name}</b><span class="text-cyan-500 font-mono text-xs italic">${s.bpm} BPM</span></div>`;
});
});

// WRITING LOGIC
document.getElementById('send-btn').addEventListener('click', async () => {
const i = document.getElementById('chat-msg');
if(i.value) { await addDoc(collection(db, "chats"), { txt: i.value, time: serverTimestamp() }); i.value = ""; }
});

document.getElementById('add-s').addEventListener('click', async () => {
const n = prompt("Titre ?");
if(n) { await addDoc(collection(db, "songs"), { name: n, bpm: "120", time: serverTimestamp() }); }
});
</script>

<script>
function show(id) {
document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav-link').forEach(l => l.classList.replace('text-cyan-500', 'text-slate-600'));
event.currentTarget.classList.replace('text-slate-600', 'text-cyan-500');
}
</script>
</body>
</html>
