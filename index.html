<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE HUB 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: flex !important; }
        .tab-content { display: none; padding-bottom: 140px; height: 100vh; overflow-y: auto; }
        .active { display: block; }
        .page { position: fixed; inset: 0; z-index: 100; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        .online-pulse { animation: pulse-cyan 2s infinite; }
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
    </style>
</head>
<body>

    <div id="page-login" class="page">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm border border-cyan-500/30 text-center shadow-2xl">
            <h1 class="text-4xl font-black italic text-cyan-500 mb-2">LIVE HUB</h1>
            <input type="tel" id="input-pass" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-2xl mb-5 text-white outline-none" placeholder="****">
            <button id="btn-to-name" class="w-full bg-cyan-600 text-white font-black py-5 rounded-2xl uppercase italic">Vérifier</button>
        </div>
    </div>

    <div id="page-name" class="page hidden text-center">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm border border-white/10 shadow-2xl">
            <input type="text" id="input-name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-xl mb-5 text-white outline-none" placeholder="Ton Prénom">
            <button id="btn-to-app" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase italic">Entrer</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050505]/90 backdrop-blur-xl z-40 border-b border-white/5">
            <h2 class="font-black italic text-xl uppercase">Live Hub <span class="text-cyan-500">2026</span></h2>
            <button id="logout-btn" class="text-red-500"><i class="fas fa-power-off"></i></button>
        </header>

        <main class="p-4 max-w-lg mx-auto">
            <section id="tab-home" class="tab-content active text-center">
                <div class="glass p-8 rounded-[3rem] mb-6 shadow-2xl">
                    <h3 class="text-3xl font-black italic uppercase mb-2" id="display-name">---</h3>
                    <div id="list-online" class="flex flex-wrap justify-center gap-2 text-[10px] mt-4"></div>
                </div>
            </section>

            <section id="tab-docs" class="tab-content">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-2xl font-black italic uppercase">Partitions</h3>
                    <button onclick="openUpload('pdf')" class="admin-only bg-cyan-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-file-pdf"></i></button>
                </div>
                <div id="list-docs" class="space-y-3"></div>
            </section>

            <section id="tab-audio" class="tab-content">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 class="text-2xl font-black italic uppercase">Sons / MP3</h3>
                    <button onclick="openUpload('audio')" class="admin-only bg-cyan-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-music"></i></button>
                </div>
                <div id="list-audio" class="space-y-3"></div>
            </section>

            <section id="tab-team" class="tab-content">
                <div class="flex justify-between items-center mb-6 px-2"><h3 class="text-2xl font-black italic uppercase">Membres</h3></div>
                <div id="list-members" class="space-y-3"></div>
            </section>

            <section id="tab-chat" class="tab-content">
                <div class="flex justify-between items-center mb-6 px-2"><h3 class="text-2xl font-black italic uppercase">Feed</h3></div>
                <div id="chat-box" class="h-[52vh] overflow-y-auto mb-4 space-y-4 pr-2 flex flex-col"></div>
                <div class="flex gap-2 p-2 glass rounded-[2.5rem] border border-white/10">
                    <input type="text" id="chat-input" class="flex-1 bg-transparent px-4 outline-none text-sm text-white" placeholder="Message...">
                    <button id="btn-send" class="bg-cyan-600 w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-sm z-50">
            <div class="glass rounded-[2.5rem] flex justify-around p-3 border border-white/10 shadow-2xl">
                <button onclick="switchTab('home', this)" class="nav-btn text-cyan-500 p-3"><i class="fas fa-home"></i></button>
                <button onclick="switchTab('docs', this)" class="nav-btn text-slate-500 p-3"><i class="fas fa-file-pdf"></i></button>
                <button onclick="switchTab('audio', this)" class="nav-btn text-slate-500 p-3"><i class="fas fa-headphones"></i></button>
                <button onclick="switchTab('team', this)" class="nav-btn text-slate-500 p-3"><i class="fas fa-users"></i></button>
                <button onclick="switchTab('chat', this)" class="nav-btn text-slate-500 p-3"><i class="fas fa-comment-alt"></i></button>
            </div>
        </nav>
    </div>

    <div id="modal-doc" class="page hidden bg-black/80 z-[200]">
        <div class="glass p-8 rounded-[2rem] w-full max-w-sm text-center">
            <h3 id="modal-title" class="text-xl font-black mb-6 uppercase text-cyan-500 italic">Ajouter</h3>
            <input type="text" id="doc-title" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-white outline-none" placeholder="Titre">
            <input type="hidden" id="current-upload-type">
            <input type="file" id="doc-input-file" class="hidden" accept=".pdf,.mp3,.wav">
            <button onclick="document.getElementById('doc-input-file').click()" class="w-full border-2 border-dashed border-white/10 p-8 rounded-2xl mb-6 text-slate-500 text-xs font-bold uppercase">Choisir le fichier</button>
            <div class="flex gap-2">
                <button onclick="closeModal('modal-doc')" class="flex-1 bg-white/5 py-4 rounded-xl">Annuler</button>
                <button id="btn-upload-doc" class="flex-1 bg-cyan-600 py-4 rounded-xl font-bold italic">ENVOYER</button>
            </div>
            <p id="upload-status" class="text-[10px] mt-4 text-cyan-500 uppercase font-black"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbcgDTWjOjog1pRDU9N5tnevD1MvfAG5Q",
            authDomain: "live-hub-2026.firebaseapp.com",
            projectId: "live-hub-2026",
            storageBucket: "live-hub-2026.firebasestorage.app",
            messagingSenderId: "56918867184",
            appId: "1:56918867184:web:7667d75288d14a565e9635"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let userName = "";

        // --- AUTH ---
        document.getElementById('btn-to-name').onclick = () => {
            const code = document.getElementById('input-pass').value;
            if(code === "0193") {
                document.body.classList.add('is-admin');
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-name').classList.remove('hidden');
            } else if (code === "0000") {
                document.getElementById('page-login').classList.add('hidden');
                document.getElementById('page-name').classList.remove('hidden');
            } else { alert("Code incorrect"); }
        };

        document.getElementById('btn-to-app').onclick = async () => {
            userName = document.getElementById('input-name').value.trim();
            if(userName) {
                document.getElementById('page-name').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-name').innerText = userName;
                await setDoc(doc(db, "presence", userName), { name: userName, lastSeen: Date.now() });
            }
        };

        // --- NAVIGATION ---
        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(l => l.classList.replace('text-cyan-500', 'text-slate-500'));
            btn.classList.replace('text-slate-500', 'text-cyan-500');
        };

        window.openUpload = (type) => {
            document.getElementById('current-upload-type').value = type;
            document.getElementById('modal-title').innerText = type === 'pdf' ? "Partition (PDF)" : "Son (MP3)";
            document.getElementById('modal-doc').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.deleteItem = async (coll, id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, coll, id)); };

        // --- UPLOAD LOGIC ---
        document.getElementById('btn-upload-doc').onclick = async () => {
            const title = document.getElementById('doc-title').value;
            const file = document.getElementById('doc-input-file').files[0];
            const type = document.getElementById('current-upload-type').value;
            const status = document.getElementById('upload-status');

            if(!title || !file) return alert("Titre ou fichier manquant");

            try {
                status.innerText = "CONNEXION FIREBASE...";
                const fileRef = ref(storage, `${type}s/${Date.now()}_${file.name}`);
                
                status.innerText = "UPLOAD EN COURS...";
                const snapshot = await uploadBytes(fileRef, file);
                const url = await getDownloadURL(snapshot.ref);

                status.innerText = "ENREGISTREMENT...";
                await addDoc(collection(db, "documents"), { 
                    title: title, 
                    url: url, 
                    type: type, 
                    time: serverTimestamp() 
                });

                status.innerText = "TERMINÉ !";
                setTimeout(() => {
                    closeModal('modal-doc');
                    status.innerText = "";
                    document.getElementById('doc-title').value = "";
                }, 1500);
            } catch (e) {
                console.error(e);
                alert("ERREUR : " + e.message);
                status.innerText = "ERREUR D'ENVOI";
            }
        };

        // --- SYNC LISTS ---
        onSnapshot(query(collection(db, "documents"), orderBy("time", "desc")), snap => {
            const listDocs = document.getElementById('list-docs');
            const listAudio = document.getElementById('list-audio');
            listDocs.innerHTML = ""; listAudio.innerHTML = "";

            snap.forEach(d => {
                const data = d.data();
                if(data.type === 'pdf') {
                    listDocs.innerHTML += `<div class="glass p-5 rounded-3xl flex justify-between items-center">
                        <div class="flex items-center gap-4"><i class="fas fa-file-pdf text-red-400"></i><b class="text-xs italic">${data.title}</b></div>
                        <div class="flex gap-2">
                            <a href="${data.url}" target="_blank" class="w-10 h-10 glass rounded-full flex items-center justify-center text-cyan-400"><i class="fas fa-eye"></i></a>
                            <button onclick="window.deleteItem('documents', '${d.id}')" class="admin-only text-red-500/20"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>`;
                } else {
                    listAudio.innerHTML += `<div class="glass p-4 rounded-3xl flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <b class="text-xs italic uppercase tracking-widest">${data.title}</b>
                            <button onclick="window.deleteItem('documents', '${d.id}')" class="admin-only text-red-500/20"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                        <audio controls class="w-full h-8 opacity-50"><source src="${data.url}" type="audio/mpeg"></audio>
                    </div>`;
                }
            });
        });

        // --- CHAT & PRESENCE (Simplifié) ---
        document.getElementById('btn-send').onclick = async () => {
            const i = document.getElementById('chat-input');
            if(i.value.trim()) { await addDoc(collection(db, "chats"), { txt: i.value, user: userName, time: serverTimestamp() }); i.value = ""; }
        };
        onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data(); const isMe = m.user === userName;
                box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2">
                    <span class="text-[7px] text-slate-600 mb-1 px-2 uppercase font-bold">${m.user}</span>
                    <div class="${isMe ? 'bg-cyan-600' : 'bg-white/10'} p-3 px-4 rounded-2xl text-sm border border-white/5 shadow-lg text-white">${m.txt}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

    </script>
</body>
</html>
