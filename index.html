<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE HUB 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
.glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
.admin-only { display: none !important; }
.is-admin .admin-only { display: flex !important; }
.tab-content { display: none; padding-bottom: 120px; height: 100vh; overflow-y: auto; }
.active { display: block; }
.page { position: fixed; inset: 0; z-index: 100; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
.hidden { display: none !important; }
#push-alert { transform: translateY(-130%); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; }
#push-alert.show { transform: translateY(20px); }
</style>
</head>
<body>

<div id="push-alert" class="fixed top-0 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass p-4 rounded-3xl border-l-4 border-cyan-500 shadow-2xl flex items-center gap-3">
<div class="bg-cyan-500/20 w-10 h-10 rounded-full flex items-center justify-center text-cyan-500"><i class="fas fa-bell"></i></div>
<div class="flex-1"><p id="push-title" class="text-[10px] font-black uppercase text-cyan-500 italic">Live Hub</p><p id="push-body" class="text-xs text-white">Message...</p></div>
</div>

<div id="page-login" class="page">
<div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
<h1 class="text-4xl font-black italic text-cyan-500 mb-8">LIVE HUB</h1>
<input type="tel" id="input-pass" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-2xl mb-5 text-white outline-none focus:border-cyan-500" placeholder="****">
<button id="btn-to-name" class="w-full bg-cyan-600 text-white font-black py-5 rounded-2xl uppercase italic">Vérifier</button>
</div>
</div>

<div id="page-name" class="page hidden text-center">
<div class="glass p-10 rounded-[3rem] w-full max-w-sm">
<input type="text" id="input-name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center text-xl mb-5 text-white outline-none" placeholder="Ton Prénom">
<button id="btn-to-app" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase italic">Entrer</button>
</div>
</div>

<div id="main-app" class="hidden min-h-screen">
<header class="p-6 flex justify-between items-center sticky top-0 bg-[#050505]/90 backdrop-blur-xl z-40 border-b border-white/5">
<h2 class="font-black italic text-xl uppercase">Live Hub <span class="text-cyan-500">2026</span></h2>
<button id="logout-btn" class="w-10 h-10 glass rounded-full text-red-500"><i class="fas fa-power-off"></i></button>
</header>

<main class="p-4 max-w-lg mx-auto">
<section id="tab-home" class="tab-content active text-center">
<div class="glass p-8 rounded-[3rem] mb-6"><h3 class="text-3xl font-black italic uppercase" id="display-name">---</h3></div>
<div class="grid grid-cols-2 gap-4">
<div class="glass p-6 rounded-3xl"><span class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Songs</span><b id="count-s" class="text-3xl font-black">0</b></div>
<div class="glass p-6 rounded-3xl"><span class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Team</span><b id="count-m" class="text-3xl font-black">0</b></div>
</div>
</section>

<section id="tab-chat" class="tab-content">
<div class="flex justify-between items-center mb-6 px-2">
<h3 class="text-2xl font-black italic uppercase">Feed</h3>
<button id="btn-urgent" class="admin-only bg-red-600/20 border border-red-500 text-red-500 font-bold px-4 py-2 rounded-xl text-[10px] uppercase">Urgence</button>
</div>
<div id="chat-box" class="h-[60vh] overflow-y-auto mb-4 space-y-4 pr-2 flex flex-col"></div>
<div class="flex gap-2 p-2 glass rounded-[2.5rem]"><input type="text" id="chat-input" class="flex-1 bg-transparent px-4 outline-none text-sm text-white" placeholder="Message..."><button id="btn-send" class="bg-cyan-600 w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button></div>
</section>
</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-sm z-50">
<div class="glass rounded-[2.5rem] flex justify-around p-3 border border-white/10 shadow-2xl">
<button onclick="switchTab('home', this)" class="nav-btn text-cyan-500 p-3"><i class="fas fa-home text-lg"></i></button>
<button onclick="switchTab('chat', this)" class="nav-btn text-slate-500 p-3"><i class="fas fa-comment-alt text-lg"></i></button>
</div>
</nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, onSnapshot, query, orderBy, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const firebaseConfig = {
apiKey: "AIzaSyAbcgDTWjOjog1pRDU9N5tnevD1MvfAG5Q",
authDomain: "live-hub-2026.firebaseapp.com",
projectId: "live-hub-2026",
storageBucket: "live-hub-2026.firebasestorage.app",
messagingSenderId: "56918867184",
appId: "1:56918867184:web:7667d75288d14a565e9635"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

let userName = "";

// --- GESTION DES TOKENS (POUR LE PUSH) ---
async function setupNotifications() {
try {
const permission = await Notification.requestPermission();
if (permission === 'granted') {
const token = await getToken(messaging, { vapidKey: 'BI2tY06MKM27z75dI6Uyeg-VEkdTQa4TU-W7G8Svtr4KGi6zwBphOmnGSvq4mkpo55Ga1iQYRucTn3nJDDDqjgk' });
if (token) {
await setDoc(doc(db, "tokens", userName), { token: token, user: userName, date: Date.now() });
}
}
} catch (err) { console.log("Erreur notifications:", err); }
}

// --- AUTH ---
document.getElementById('btn-to-name').onclick = () => {
const code = document.getElementById('input-pass').value;
if(code === "0193" || code === "0000") {
if(code === "0193") document.body.classList.add('is-admin');
document.getElementById('page-login').classList.add('hidden');
document.getElementById('page-name').classList.remove('hidden');
}
};

document.getElementById('btn-to-app').onclick = async () => {
userName = document.getElementById('input-name').value.trim();
if(userName.length >= 2) {
document.getElementById('page-name').classList.add('hidden');
document.getElementById('main-app').classList.remove('hidden');
document.getElementById('display-name').innerText = userName;
setupNotifications(); // On active les notifications
}
};

// --- CHAT ---
document.getElementById('btn-send').onclick = async () => {
const i = document.getElementById('chat-input');
if(i.value.trim()) {
await addDoc(collection(db, "chats"), { txt: i.value, user: userName, time: serverTimestamp() });
i.value = "";
}
};

document.getElementById('btn-urgent').onclick = async () => {
const msg = prompt("MESSAGE D'URGENCE :");
if(msg) await addDoc(collection(db, "chats"), { txt: `🚨 URGENT : ${msg}`, user: userName, time: serverTimestamp() });
};

onSnapshot(query(collection(db, "chats"), orderBy("time", "asc")), snap => {
const box = document.getElementById('chat-box'); box.innerHTML = "";
snap.forEach(d => {
const m = d.data(); const isMe = m.user === userName;
box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2">
<span class="text-[7px] text-slate-600 mb-1 px-2 font-bold">${m.user}</span>
<div class="${isMe ? 'bg-cyan-600' : 'bg-white/10'} p-3 px-4 rounded-2xl text-sm border border-white/5 shadow-lg">${m.txt}</div>
</div>`;
});
box.scrollTop = box.scrollHeight;
});

onMessage(messaging, (payload) => {
document.getElementById('push-title').innerText = payload.notification.title;
document.getElementById('push-body').innerText = payload.notification.body;
document.getElementById('push-alert').classList.add('show');
setTimeout(() => document.getElementById('push-alert').classList.remove('show'), 5000);
});

window.switchTab = (id, btn) => {
document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
document.getElementById('tab-' + id).classList.add('active');
document.querySelectorAll('.nav-btn').forEach(l => l.classList.replace('text-cyan-500', 'text-slate-500'));
btn.classList.replace('text-slate-500', 'text-cyan-500');
};
</script>
</body>
</html>
